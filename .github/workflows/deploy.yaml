name: RetailMex CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest 
    steps:
    
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2


      - name: Sync S3 Assets
        run: |
          aws s3 sync ./infrastructure s3://bucket-scripts-retailmex/ --delete
          aws s3 sync ./src s3://bucket-scripts-retailmex/scripts/ --delete

      - name: Deploy CloudFormation
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: RetailMex-DataLakehouse-STG
          template: infrastructure/master.yaml
          capabilities: CAPABILITY_NAMED_IAM
          no-fail-on-empty-changeset: "1"
          parameter-overrides: >-
            Environment=stg,
            TemplateBucketURL=https://bucket-scripts-retailmex.s3.us-east-2.amazonaws.com/,
            S3ScriptPath=s3://bucket-scripts-retailmex/scripts/etl_silver.py